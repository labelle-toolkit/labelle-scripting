name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Read-only job: never persist the GITHUB_TOKEN in .git/config.
          persist-credentials: false

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # The rust sub-module's suite (labelle-engine#741): `zig build test`
      # cargo-builds tests/rust's staticlib (zero crate deps, --locked, no
      # network) and links it into the rust test binary. rustc ≥ 1.82
      # (rust-version in the Cargo.tomls); rustfmt for the check below.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      # The crystal sub-module's suites (labelle-engine#741): `zig build
      # test` crystal-builds tests/crystal's script object and localizes
      # its `main` — the linux leg exercises the objcopy branch (binutils
      # is preinstalled on ubuntu runners) and the linux `.system_libs`
      # set: gc/pcre2 resolve via the (colon-split) `crystal env
      # CRYSTAL_LIBRARY_PATH`, and gcc_s is the unwinder the
      # raise-containment tests FUNCTIONALLY prove (crystal begin/rescue
      # needs _Unwind_* — a wrong unwinder choice fails those tests
      # here, not just the link). Pinned minor: the embedding recipe
      # relies on ≥ 1.16 runtime facts (Crystal.init_runtime,
      # Slice.literal constants); bump deliberately, never float.
      - name: Setup Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: "1.17"

      # The csharp sub-module's suite (labelle-engine#743): `zig build test`
      # `dotnet build`s tests/csharp's managed assembly and loads it through
      # hostfxr against the mock host (the test binary is linked rdynamic so
      # its contract exports bind the assembly's [LibraryImport]). Needs the
      # .NET SDK ≥ 7 (the [LibraryImport] source generator); framework-
      # dependent, so the installed runtime serves hostfxr. build.zig SKIPS
      # the csharp binary when `dotnet` is absent, so this step is what makes
      # the lane actually run — drop it and csharp silently goes uncovered.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "7.0.x"

      # The lua dep is lazy — `zig build test` fetches it on demand
      # (network needed once; hash-pinned in build.zig.zon).
      #
      # A green build must also be CLEAN: zig's build runner relays a
      # test binary's residual stderr through its failure printer EVEN
      # ON SUCCESS ("No matter the result…" in build_runner.zig), which
      # appends a phantom `failed command:` line — exactly what the rust
      # panic-containment tests produced while expected panics still hit
      # rust's default stderr reporter (now routed to the game log sink
      # by the glue's panic hook). The grep pins that this stays fixed;
      # a REAL failure exits nonzero before the grep matters (pipefail).
      - name: Run tests
        run: |
          # Actions' default shell is `bash -e {0}` WITHOUT pipefail — set
          # it explicitly or tee masks a zig build failure with exit 0.
          set -o pipefail
          zig build test 2>&1 | tee test.log
          if grep -q "failed command:" test.log; then
            echo "E: phantom 'failed command:' in a passing build — a test binary left residual stderr (see above)"
            exit 1
          fi

      - name: Formatting
        # examples/ts-game rides along for its game-root .zig files
        # (components/events/hooks — `zig fmt` walks dirs and touches only
        # .zig, so the .ts sources are ignored; there is no canonical
        # no-toolchain TS formatter, and prettier/npm stay out of CI by
        # design — tsc 7 checks, it doesn't format).
        run: zig fmt --check build.zig src tests examples/ts-game

      - name: Rust formatting
        run: |
          cargo fmt --check --manifest-path native/Cargo.toml
          cargo fmt --check --manifest-path tests/rust/Cargo.toml
          # The rust example game's sources have no manifest of their own
          # (they compile as the plugin crate's game module out of the
          # game's scripts/ dir) — check them file-wise.
          rustfmt --check --edition 2021 examples/rust-game/scripts/*.rs

      - name: Crystal formatting
        # The crystal example game's sources ride along: like the rust
        # example's, they have no build manifest of their own (they
        # compile as the plugin package's game module out of the game's
        # scripts/ dir) — check the dir.
        run: crystal tool format --check native-crystal tests/crystal examples/crystal-game/scripts

  # Ruby example game (labelle-scripting#10) — the ruby counterpart of the
  # assembler's `examples/scripting-smoke`, living in THIS repo so every
  # push runs a real ruby game through the real assembler against the real
  # engine: examples/ruby-game pins its scripting plugin `local:../..`
  # (the CURRENT checkout), so the vendored mruby, prelude, bindings and
  # Controller under review are exactly what the generated game embeds.
  # Ruby's permanent regression net — and the toolkit's first
  # PROVABLY-PURE game (labelle-engine#772): scripts, components and the
  # custom event are all .rb; the one .zig (hooks/feed_watcher.zig) is
  # the optional native escape hatch, and the second step deletes it in
  # a scratch copy and runs the game green without it.
  ruby-example:
    runs-on: ubuntu-latest
    # Cold toolkit fetch + engine/mruby compile normally lands well under
    # 15; bound a wedged runner far below GitHub's 6h default.
    timeout-minutes: 30
    env:
      # The pinned labelle-assembler release the example generates with —
      # a BINARY release (tag → release.yml assets). v0.87.0 is the HARD
      # floor for this example: it collects EVENT declarations in
      # `events/*.rb` (labelle-assembler#618 — labelle-engine#772's
      # assembler slice; older releases fail generate up front naming the
      # events files), on top of v0.86.0's layout floor
      # (labelle-engine#237): the shared `scripts/` dir with ordering
      # prefixes (labelle-assembler#614) and ruby COMPONENT declarations
      # in `components/*.rb` (labelle-assembler#615's DECLARE_RUNNERS row,
      # wiring this repo's tools/declare-ruby — events need its v0.10.0
      # `Labelle.event`, satisfied here by the `local:../..` pin). The
      # other three example jobs pin the same release — one assembler
      # generates all four examples. Bump deliberately, never float.
      ASSEMBLER_VERSION: v0.87.0
    steps:
      # Checkout into a subdir so the example's sibling pins resolve:
      # examples/ruby-game/../../../labelle-null = $GITHUB_WORKSPACE/labelle-null.
      - uses: actions/checkout@v4
        with:
          path: labelle-scripting
          # Read-only job: never persist the GITHUB_TOKEN in .git/config.
          persist-credentials: false

      # Sibling checkout for the null backend: the generated main's
      # `script_contract.bind` touchpoint lives in labelle-null's
      # `templates/headless.txt` (labelle-null#5, on main) and the latest
      # release (v0.3.0) predates it — same sibling pattern as the
      # assembler's own scripting-smoke job (which pins the same repo).
      # Drop this clone (and the example's `backend_package` sibling pin)
      # once labelle-null cuts a release with the touchpoint.
      - name: Checkout labelle-null (bind touchpoint is unreleased)
        run: |
          git clone --depth 1 --branch main \
            https://github.com/labelle-toolkit/labelle-null.git labelle-null

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Download the pinned labelle-assembler release binary
        run: |
          curl -fL -o labelle-assembler \
            "https://github.com/labelle-toolkit/labelle-assembler/releases/download/${ASSEMBLER_VERSION}/labelle-assembler-linux-x86_64"
          chmod +x labelle-assembler

      # Mirrors the assembler's scripting-smoke CI step (the Lua
      # end-to-end): generate → codegen greps → build (fingerprint dance)
      # → bounded headless run → ordered-transcript diff. Frame-by-frame
      # timeline: scripts/20_hunger_controller.rb's header.
      - name: Generate + build + run the ruby example game
        run: |
          # Fresh HOME for the whole flow: the assembler keeps its package
          # Actions' default shell has no pipefail — without it the tee
          # below masks a failed generate with exit 0.
          set -o pipefail

          # cache under ~/.labelle — never let a runner's (or, when run
          # locally, a developer's) real one leak into the run.
          export HOME="$RUNNER_TEMP/labelle-home"
          mkdir -p "$HOME"

          cd labelle-scripting/examples/ruby-game
          ASM=$GITHUB_WORKSPACE/labelle-assembler

          # Fetch core/engine/gfx releases into the package cache. The
          # scripting plugin needs no fetch (`local:../..` — this
          # checkout) and neither does the backend (`backend_package`
          # pins the sibling labelle-null clone above).
          $ASM install --project-root .
          $ASM generate --project-root . 2>&1 | tee generate.log

          # Belt and braces on top of the exit code (pipefail set at the
          # top of this step): never trust artifacts past a failed
          # generate.
          if grep -q 'generate failed' generate.log; then
            echo "E: generate reported failure"
            exit 1
          fi
          # Ruby DECLARES components now (v0.86.0 DECLARE_RUNNERS + this
          # repo's tools/declare-ruby): NO declare-phase skip note may
          # appear — its presence means the runner row or the in-package
          # tool probe regressed (the pre-v0.86.0 assertion was the
          # inverse: ruby was a non-declare language and CI pinned the
          # pointed skip note).
          if grep -q 'script-declared components' generate.log; then
            echo "E: declare-phase skip note printed — ruby declares since v0.86.0"
            exit 1
          fi
          # This example is MIGRATED to scripts/ — the legacy-dir grace
          # note must not appear (its presence means a ruby/ dir leaked
          # back in, or the resolve probe regressed).
          if grep -q 'keeps working for one release of grace' generate.log; then
            echo "E: legacy script-dir deprecation note printed for a migrated example"
            exit 1
          fi
          # THE declare assertions: components/hunger.rb's schema landed
          # as a real generated registry component (field defaults
          # included — the transcript's 0.875 seed comes from HERE),
          # components/worker.rb's zero-field tag beside it, and
          # events/hunger__feed.rb's schema as the generated event struct
          # (labelle-engine#772 / assembler v0.87.0: ONE
          # scripting_events.zig at the target root — fields sorted by
          # name, Labelle.id classified u64).
          grep -qF 'pub const Hunger' .labelle/null_desktop/scripting_components.zig
          grep -qF 'level: f32 = 0.875,' .labelle/null_desktop/scripting_components.zig
          grep -qF 'pub const Worker' .labelle/null_desktop/scripting_components.zig
          grep -qF 'pub const HungerFeed' .labelle/null_desktop/scripting_events.zig
          grep -qF 'amount: f32 = 0.5,' .labelle/null_desktop/scripting_events.zig
          grep -qF 'entity: u64 = 0,' .labelle/null_desktop/scripting_events.zig

          # Codegen assertions — each is one link of the chain; fail
          # loudly if a regression drops it.
          M=.labelle/null_desktop/main.zig
          # The declared components wired into the game's component
          # registry — scenes/saves/typed queries reach them like any
          # components/*.zig file.
          grep -qF '.Hunger = @import("scripting_components.zig").Hunger,' $M
          grep -qF '.Worker = @import("scripting_components.zig").Worker,' $M
          # The declared EVENT's union row — byte-for-byte the shape a
          # Zig-authored events/hunger__feed.zig produced, so the bus,
          # the sidecars and the native hook consume it unchanged.
          grep -qF 'hunger__feed: @import("scripting_events.zig").HungerFeed,' $M
          # Splice: all six ruby chunks registered before the VM boots —
          # components/ DECLARATIONS first (their view constants must
          # exist when scripts load), then events/ (the `HungerFeed`
          # constant scripts/feed_watcher.rb subscribes with), then
          # scripts/ in ordering-prefix order (stems stripped:
          # 10_spawner → "spawner"), unnumbered last. The ORDER is the
          # contract (components → events → scripts, pinned by the
          # assembler), so diff it, don't just grep.
          grep -qF 'scripting.registerScript("hunger", @embedFile("components/hunger.rb"));' $M
          grep -qF 'scripting.registerScript("worker", @embedFile("components/worker.rb"));' $M
          grep -qF 'scripting.registerScript("hunger__feed", @embedFile("events/hunger__feed.rb"));' $M
          grep -qF 'scripting.registerScript("spawner", @embedFile("scripts/10_spawner.rb"));' $M
          grep -qF 'scripting.registerScript("hunger_controller", @embedFile("scripts/20_hunger_controller.rb"));' $M
          grep -qF 'scripting.registerScript("feed_watcher", @embedFile("scripts/feed_watcher.rb"));' $M
          grep -oE 'registerScript\("[a-z_0-9]+"' $M | cut -d'"' -f2 > .labelle/reg_order.txt
          printf '%s\n' hunger worker hunger__feed spawner hunger_controller feed_watcher > .labelle/reg_expected.txt
          diff .labelle/reg_expected.txt .labelle/reg_order.txt

          # Purity inventory (labelle-engine#772's mandate: every shipped
          # language can go 100% selected-language): the ONLY authored
          # .zig in this example is the OPTIONAL native escape hatch. If
          # a new .zig sneaks in as a load-bearing part of the example,
          # this fails and the purity story is void — make it a .rb, or
          # consciously move it into hooks/ and update the variant below.
          ZIGS=$(git ls-files -- '*.zig')
          if [ "$ZIGS" != "hooks/feed_watcher.zig" ]; then
            echo "E: examples/ruby-game .zig inventory changed (expected exactly hooks/feed_watcher.zig):"
            printf '%s\n' "$ZIGS"
            exit 1
          fi
          # Splice: the generated flag half of the templates' double-gate.
          grep -qF 'const scripting_enabled = true;' $M
          # labelle-null template: the bind touchpoint (proves the sibling
          # checkout — not the stale v0.3.0 release — was staged).
          grep -qF 'engine.script_contract.bind(&g);' $M
          # Splice: the VM tick that actually advances the scripts.
          grep -qF 'scripting.Controller.tick(&g, scaled_dt);' $M
          # Splice: the event tap between plugin ticks and dispatchEvents.
          grep -qF 'engine.script_contract.drainEvents(&g);' $M
          # Game-root hooks scan: the native hunger__feed subscriber
          # (hooks/feed_watcher.zig) folded into the GameHooks receiver
          # tuple — the Zig half of the cross-layer events interop.
          grep -qF 'feed_u_watcher.FeedWatcher' $M
          # Build wiring: the plugin's -Dlanguage option selects mruby.
          grep -qF '.language = .ruby' .labelle/null_desktop/build.zig

          cd .labelle/null_desktop

          # labelle-cli-equivalent fixFingerprint dance — the assembler
          # emits a placeholder fingerprint.
          set +e
          ERR=$(zig build 2>&1)
          set -e
          # `|| true`: with pipefail on, a NO-MATCH grep would otherwise
          # exit 1 and set -e kills the step silently — and the happy path
          # (first build succeeds, ERR empty, nothing to fix) is real: this
          # example's fingerprint has never actually needed the dance.
          BAD=$(printf '%s\n' "$ERR" | grep -oE 'invalid fingerprint: 0x[0-9a-f]+' | head -1 | awk '{print $3}' || true)
          GOOD=$(printf '%s\n' "$ERR" | grep -oE 'use this value: 0x[0-9a-f]+' | head -1 | awk '{print $4}' || true)
          if [ -n "$BAD" ] && [ -n "$GOOD" ]; then
            echo "labelle-cli-equivalent fixFingerprint: ${BAD} -> ${GOOD}"
            sed -i "s/${BAD}/${GOOD}/" build.zig.zon
          fi
          zig build

          # Headless bounded run: no window, no GL — the binary runs to
          # completion (rc=0) or crashes.
          LABELLE_NULL_FRAMES=5 ./zig-out/bin/ruby_game > run.log 2>&1

          # Pin the exact ordered milestone sequence. Tokens carry
          # BEHAVIOR, not liveness: the 0.875 the chain starts from is
          # the DECLARED default out of components/hunger.rb (the spawner
          # attaches Hunger bare), so tick 1's RUBY_LEVEL_0.625 proves
          # the ruby declaration traveled schema → codegen → registry →
          # ECS; every RUBY_LEVEL_* value is the level the controller
          # wrote through the real ECS that tick (each one reachable
          # only via the previous tick's persisted write),
          # RUBY_FED_LEVEL_0.875 is re-READ after the feed handler's
          # write — the emitted id and f32 0.5 amount round-tripped the
          # engine bus bit-exact — ZIG_FEED_SEEN_0.5 is the NATIVE
          # game-root hook consuming the same emit with the parsed
          # payload amount, at tick 2's dispatchEvents (frame end, one
          # tick BEFORE the ruby handlers' inbox — the cross-layer
          # latency is part of the pin), and RUBY_WATCHER_SAW_0.5 is the
          # THIRD subscriber (scripts/feed_watcher.rb, a top-level
          # file-scope sub) on tick 3's inbox, BEFORE the controller's
          # handler — per-event handlers run in subscription order and
          # the chunk-load sub predates the setup-time one. The char
          # class includes '.' for exactly the value-carrying tokens.
          # Timeline: scripts/20_hunger_controller.rb.
          grep -oE '(RUBY|ZIG)_[A-Z0-9_.]+' run.log > actual.txt || true
          cat > expected.txt <<'END'
          RUBY_INIT
          RUBY_CTRL_READY
          RUBY_LEVEL_0.625
          RUBY_FEED_SENT
          RUBY_LEVEL_0.375
          ZIG_FEED_SEEN_0.5
          RUBY_ENGINE_TICK_SEEN
          RUBY_WATCHER_SAW_0.5
          RUBY_FED_LEVEL_0.875
          RUBY_LEVEL_0.625
          RUBY_LEVEL_0.375
          RUBY_LEVEL_0.125
          RUBY_STARVING
          RUBY_FRAMEARRAY_OK
          RUBY_CTRL_DONE
          RUBY_DEINIT
          END
          sed -i 's/^          //' expected.txt
          if ! diff -u expected.txt actual.txt; then
            echo "E: ruby-example milestone sequence mismatch"
            echo "--- full captured output ---"
            cat run.log
            exit 1
          fi
          echo "PASS: ruby drove the real engine — ruby-DECLARED components (hunger.rb defaults through the ECS, worker.rb tag) + ruby-DECLARED hunger__feed event (events/hunger__feed.rb through the generated union, consumed natively: ZIG_FEED_SEEN_0.5) + plain hooks + controller + three subscribers off one bus + FrameArray + engine__tick over 5 headless frames, against this repo's HEAD"

      # THE PURITY PROOF (labelle-engine#772's mandate: "every shipped
      # language must be able to go 100% selected-language — no Zig at
      # all"). hooks/feed_watcher.zig is the example's OPTIONAL native
      # escape hatch — kept above as the interop demo — so purity is
      # proven by deletion: scratch-copy the example, rm -rf the copy's
      # hooks/, regenerate + rebuild + rerun. The copy is a ZERO-.zig
      # game (asserted), the generated main folds no FeedWatcher, and
      # the transcript is the SAME 16-token run minus exactly
      # ZIG_FEED_SEEN_0.5 — nothing else moves, so the native layer is
      # demonstrably additive, never load-bearing. Reuses the main
      # step's warm package/zig caches (same redirected HOME).
      - name: Purity variant — delete hooks/, rerun 100% ruby
        run: |
          set -o pipefail
          export HOME="$RUNNER_TEMP/labelle-home"

          cd labelle-scripting/examples
          rm -rf ruby-game-pure && mkdir ruby-game-pure
          (cd ruby-game && tar cf - --exclude .labelle --exclude generate.log .) | (cd ruby-game-pure && tar xf -)
          rm -rf ruby-game-pure/hooks
          cd ruby-game-pure

          # 100% ruby, provably: not one .zig file in the authored tree.
          if [ -n "$(find . -name '*.zig' -not -path './.labelle/*')" ]; then
            echo "E: purity copy still contains .zig files:"
            find . -name '*.zig' -not -path './.labelle/*'
            exit 1
          fi

          ASM=$GITHUB_WORKSPACE/labelle-assembler
          $ASM install --project-root .
          $ASM generate --project-root . 2>&1 | tee generate.log
          if grep -q 'generate failed' generate.log; then
            echo "E: generate reported failure"
            exit 1
          fi

          # The ruby-declared event still generates; the hooks scan folds
          # nothing (no receiver, no native subscriber).
          grep -qF 'pub const HungerFeed' .labelle/null_desktop/scripting_events.zig
          if grep -q 'FeedWatcher' .labelle/null_desktop/main.zig; then
            echo "E: FeedWatcher receiver generated for a hooks-less game"
            exit 1
          fi

          cd .labelle/null_desktop
          set +e
          ERR=$(zig build 2>&1)
          set -e
          BAD=$(printf '%s\n' "$ERR" | grep -oE 'invalid fingerprint: 0x[0-9a-f]+' | head -1 | awk '{print $3}' || true)
          GOOD=$(printf '%s\n' "$ERR" | grep -oE 'use this value: 0x[0-9a-f]+' | head -1 | awk '{print $4}' || true)
          if [ -n "$BAD" ] && [ -n "$GOOD" ]; then
            echo "labelle-cli-equivalent fixFingerprint: ${BAD} -> ${GOOD}"
            sed -i "s/${BAD}/${GOOD}/" build.zig.zon
          fi
          zig build

          LABELLE_NULL_FRAMES=5 ./zig-out/bin/ruby_game > run.log 2>&1

          # The full job's pinned sequence minus exactly the native
          # hook's token — every ruby-side milestone, position and value,
          # survives the deletion untouched.
          grep -oE '(RUBY|ZIG)_[A-Z0-9_.]+' run.log > actual.txt || true
          cat > expected.txt <<'END'
          RUBY_INIT
          RUBY_CTRL_READY
          RUBY_LEVEL_0.625
          RUBY_FEED_SENT
          RUBY_LEVEL_0.375
          RUBY_ENGINE_TICK_SEEN
          RUBY_WATCHER_SAW_0.5
          RUBY_FED_LEVEL_0.875
          RUBY_LEVEL_0.625
          RUBY_LEVEL_0.375
          RUBY_LEVEL_0.125
          RUBY_STARVING
          RUBY_FRAMEARRAY_OK
          RUBY_CTRL_DONE
          RUBY_DEINIT
          END
          sed -i 's/^          //' expected.txt
          if ! diff -u expected.txt actual.txt; then
            echo "E: purity-variant milestone sequence mismatch"
            echo "--- full captured output ---"
            cat run.log
            exit 1
          fi
          echo "PASS: the 100% ruby game (zero .zig) generated, built and ran green — hooks/ is proven OPTIONAL (15 tokens, ZIG_FEED_SEEN_0.5 alone gone)"

  # Rust example game (labelle-engine#741) — the NATIVE-COMPILED counterpart
  # of ruby-example, living in THIS repo so every push runs a real rust game
  # through the real assembler against the real engine: examples/rust-game
  # pins its scripting plugin `local:../..` (the CURRENT checkout), so the
  # native/ crate, the glue and src/rust/vm.zig under review are exactly
  # what cargo compiles and the generated game links. The native family's
  # permanent regression net — and the end-to-end proof that generate →
  # stage → cargo → link → run works, not just the mock-host suite.
  rust-example:
    runs-on: ubuntu-latest
    # Cold toolkit fetch + engine compile + one zero-dep cargo release
    # build normally lands well under 15; bound a wedged runner far below
    # GitHub's 6h default.
    timeout-minutes: 30
    env:
      # The pinned labelle-assembler release the example generates with —
      # a BINARY release (tag → release.yml assets). v0.86.0 is the HARD
      # floor for this example's layout: the shared `scripts/` dir
      # (labelle-assembler#614) replaces the legacy rust/ dir for the
      # native family too — the splice links the game's scripts/ over the
      # staged package's native/src/game/ with `scripts/mod.rs` as the
      # crate-module root. (The native splice itself is older: #608 in
      # v0.84.0 recognized rust and consumes plugin.labelle's
      # `.language_builds` cargo step; v0.85.0 added the step-schema
      # forward-compat the crystal entry needs.) Older releases read only
      # the legacy rust/ dir — absent here, so nothing stages and the
      # greps below fail loudly. Bump deliberately, never float.
      # (Pinned one notch above this job's own floor: all four example
      # jobs ride ONE assembler release — the ruby example's events/*.rb
      # declarations set the repo-wide v0.87.0 pin.)
      ASSEMBLER_VERSION: v0.87.0
    steps:
      # Checkout into a subdir so the example's sibling pins resolve:
      # examples/rust-game/../../../labelle-null = $GITHUB_WORKSPACE/labelle-null.
      - uses: actions/checkout@v4
        with:
          path: labelle-scripting
          # Read-only job: never persist the GITHUB_TOKEN in .git/config.
          persist-credentials: false

      # Sibling checkout for the null backend — same reason and same
      # pattern as ruby-example above (the `script_contract.bind`
      # touchpoint is on labelle-null main, unreleased).
      - name: Checkout labelle-null (bind touchpoint is unreleased)
        run: |
          git clone --depth 1 --branch main \
            https://github.com/labelle-toolkit/labelle-null.git labelle-null

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # The generated game's build SHELLS OUT to cargo (the plugin's
      # declared `.language_builds` step) — the toolchain must exist
      # before `zig build`. Same pin story as the test job: rustc ≥ 1.82.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download the pinned labelle-assembler release binary
        run: |
          curl -fL -o labelle-assembler \
            "https://github.com/labelle-toolkit/labelle-assembler/releases/download/${ASSEMBLER_VERSION}/labelle-assembler-linux-x86_64"
          chmod +x labelle-assembler

      # Mirrors ruby-example's flow: generate → codegen greps → build
      # (fingerprint dance) → bounded headless run → ordered-transcript
      # diff. The native-family deltas are the point of every grep below.
      # Frame-by-frame timeline: scripts/mod.rs's header.
      - name: Generate + build + run the rust example game
        run: |
          # Actions' default shell has no pipefail — without it the tee
          # below masks a failed generate with exit 0.
          set -o pipefail

          # Cargo must SURVIVE the fresh-HOME swap below: rustup resolves
          # its default toolchain through settings under the REAL home
          # ($RUSTUP_HOME), and the shim in PATH dies without them
          # ("rustup could not choose a version of cargo to run"). Pin
          # both cargo homes to the real locations FIRST — only the
          # assembler's package cache (~/.labelle) must land in the
          # isolated HOME.
          export RUSTUP_HOME="$HOME/.rustup"
          export CARGO_HOME="$HOME/.cargo"

          # Fresh HOME for the whole flow: the assembler keeps its package
          # cache under ~/.labelle — never let a runner's (or, when run
          # locally, a developer's) real one leak into the run.
          export HOME="$RUNNER_TEMP/labelle-home"
          mkdir -p "$HOME"

          cd labelle-scripting/examples/rust-game
          ASM=$GITHUB_WORKSPACE/labelle-assembler

          # Fetch core/engine/gfx releases into the package cache. The
          # scripting plugin needs no fetch (`local:../..` — this
          # checkout) and neither does the backend (`backend_package`
          # pins the sibling labelle-null clone above).
          $ASM install --project-root .
          $ASM generate --project-root . 2>&1 | tee generate.log

          # Belt and braces on top of the exit code (pipefail set at the
          # top of this step): never trust artifacts past a failed
          # generate.
          if grep -q 'generate failed' generate.log; then
            echo "E: generate reported failure"
            exit 1
          fi
          # Native splices skip the declare phase SILENTLY (zero embedded
          # scripts — the phase no-ops before its language gate), unlike
          # the embed family's pointed notes. Its presence would mean the
          # splice got misclassified as an embed family.
          if grep -q 'script-declared components' generate.log; then
            echo "E: declare-phase note printed for a native splice"
            exit 1
          fi
          # This example is MIGRATED to scripts/ — the legacy-dir grace
          # note must not appear (its presence means a rust/ dir leaked
          # back in, or the resolve probe regressed).
          if grep -q 'keeps working for one release of grace' generate.log; then
            echo "E: legacy script-dir deprecation note printed for a migrated example"
            exit 1
          fi

          # Codegen assertions — each is one link of the chain; fail
          # loudly if a regression drops it.
          M=.labelle/null_desktop/main.zig
          B=.labelle/null_desktop/build.zig
          # THE native-family assertion: rust arrives as machine code —
          # nothing embeds, nothing registers. A registerScript line here
          # means the splice fell back to the embed family.
          if grep -q 'registerScript' $M; then
            echo "E: registerScript emitted for a native-compiled language"
            exit 1
          fi
          # Splice (family-shared): the generated flag half of the
          # templates' double-gate.
          grep -qF 'const scripting_enabled = true;' $M
          # labelle-null template: the bind touchpoint (proves the sibling
          # checkout — not the stale v0.3.0 release — was staged).
          grep -qF 'engine.script_contract.bind(&g);' $M
          # Splice: the Controller tick that drives inbox dispatch +
          # every script's update(dt) through the crate glue.
          grep -qF 'scripting.Controller.tick(&g, scaled_dt);' $M
          # Splice: the event tap between plugin ticks and dispatchEvents.
          grep -qF 'engine.script_contract.drainEvents(&g);' $M
          # Game-root hooks scan: the native hunger__feed subscriber
          # (hooks/feed_watcher.zig) folded into the GameHooks receiver
          # tuple — the Zig half of the cross-layer events interop.
          grep -qF 'feed_u_watcher.FeedWatcher' $M
          # Build wiring: the plugin's -Dlanguage option selects the rust
          # dispatcher (src/rust/vm.zig — no VM compiled in).
          grep -qF '.language = .rust' $B
          # Build wiring (.language_builds → #586 steps): the emitted
          # cargo command, verbatim through the declared argv prefix (the
          # --manifest-path value is a generate-time absolute literal).
          grep -qF 'b.addSystemCommand(&.{ "cargo", "build", "--release", "--quiet", "--locked", "--manifest-path"' $B
          # Build wiring: the {staticlib:...}-expanded artifact path —
          # per-OS name resolved at build time (liblabelle_rust_scripts.a
          # here, labelle_rust_scripts.lib on windows) — and its link
          # onto the game binary.
          grep -qF 'b.path(b.fmt("plugin-build/scripting/release/{s}labelle_rust_scripts{s}", .{ plugin_build_lib_prefix, plugin_build_lib_ext }))' $B
          grep -qF 'exe.root_module.addObjectFile(plugin_scripting_build_artifact_0);' $B
          # Build wiring: the declared per-OS system libs (the
          # panic=unwind staticlib needs the toolchain's native static
          # libs at the final link on linux).
          grep -qF 'exe.root_module.linkSystemLibrary("gcc_s", .{});' $B
          # Staging is a LIVE LINK, not a copy (deps are shared across
          # targets — .labelle/deps/): the game's scripts/ IS the staged
          # crate's game module (module root scripts/mod.rs — the #614
          # native-staging shape), so edits flow into the next
          # `zig build` without a re-generate. One symlink test + one
          # read-through beats a second full build.
          STAGED=.labelle/deps/labelle-scripting/native/src/game
          test -L "$STAGED"
          cmp scripts/mod.rs "$STAGED/mod.rs"

          cd .labelle/null_desktop

          # labelle-cli-equivalent fixFingerprint dance — the assembler
          # emits a placeholder fingerprint.
          set +e
          ERR=$(zig build 2>&1)
          set -e
          # `|| true`: with pipefail on, a NO-MATCH grep would otherwise
          # exit 1 and set -e kills the step silently — and the happy path
          # (first build succeeds, ERR empty, nothing to fix) is real: this
          # example's fingerprint has never actually needed the dance.
          BAD=$(printf '%s\n' "$ERR" | grep -oE 'invalid fingerprint: 0x[0-9a-f]+' | head -1 | awk '{print $3}' || true)
          GOOD=$(printf '%s\n' "$ERR" | grep -oE 'use this value: 0x[0-9a-f]+' | head -1 | awk '{print $4}' || true)
