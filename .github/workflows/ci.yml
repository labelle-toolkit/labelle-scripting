          CRYSTAL_CTRL_READY
          CRYSTAL_LEVEL_0.625
          CRYSTAL_FEED_SENT
          CRYSTAL_LEVEL_0.375
          ZIG_FEED_SEEN_0.5
          CRYSTAL_ENGINE_TICK_SEEN
          CRYSTAL_FED_LEVEL_0.875
          CRYSTAL_LEVEL_0.625
          CRYSTAL_LEVEL_0.375
          CRYSTAL_LEVEL_0.125
          CRYSTAL_STARVING
          CRYSTAL_BUFFERS_OK
          CRYSTAL_CTRL_DONE
          CRYSTAL_DEINIT
